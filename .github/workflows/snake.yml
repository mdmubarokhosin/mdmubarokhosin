# ============================================================
#  GitHub Snake Contribution Animation
#  Repository: mdmubarokhosin/mdmubarokhosin
#  Guide: https://github.com/Platane/snk
# ============================================================

name: Generate Snake Animation

# ----------------------------------
# কখন কখন এটা রান হবে:
# 1. প্রতিদিন রাত 12টায় (UTC) অটোমেটিক
# 2. যখন তুমি এই ফাইলে push করবে (ম্যানুয়ালি টেস্ট)
# 3. যখন তুমি manual trigger দেবে (GitHub Actions পেজ থেকে)
# ----------------------------------
on:
  schedule:
    - cron: "0 0 * * *"           # প্রতিদিন UTC 00:00 (বাংলাদেশ সময় ভোর 6টা)
  workflow_dispatch:               # ম্যানুয়ালি রান করার অপশন

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # --------------------------------
      # Step 1: Repository এর কোড ডাউনলোড
      # --------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --------------------------------
      # Step 2: Snake SVG জেনারেট করা
      # --------------------------------
      # এই action তোমার GitHub contribution graph
      # থেকে data নিয়ে snake animation SVG বানায়
      #
      # প্যারামিটার ব্যাখ্যা:
      # - github_user_name: তোমার GitHub username
      # - outputs: কয়টা SVG ফাইল তৈরি হবে (dark + light)
      # --------------------------------
      - name: Generate Snake from GitHub Contribution Graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark#006a4e_f42a41_004d3a#e8e8ed
            dist/github-snake.svg?palette=github-light#006a4e_f42a41_004d3a#0a0a0f

      # --------------------------------
      # Step 3: আগের SVG ফাইলগুলো push করা
      # --------------------------------
      # এটা GitHub-এর caching system bypass করার জন্য
      # প্রথমবার artifact হিসেবে upload করে
      # --------------------------------
      - name: Push Previous SVG as Artifact (Cache Bypass Trick)
        uses: actions/upload-artifact@v4
        with:
          name: output-artifact
          path: dist/
          retention-days: 1

      # --------------------------------
      # Step 4: আগের আউটপুট ফোল্ডার থেকে
      #         পুরানো SVG গুলো রিস্টোর করা
      # --------------------------------
      # এটা না থাকলে প্রতিদিন শুধু নতুন ফ্রেম
      # সেভ হবে, পুরো animation থাকবে না
      # --------------------------------
      - name: Download Previous Output for Frame Preservation
        uses: actions/download-artifact@v4
        with:
          name: output-artifact
          path: dist/
        continue-on-error: true

      # --------------------------------
      # Step 5: ফাইনাল SVG আউটপুট ফোল্ডারে
      #         কপি করা ও commit করা
      # --------------------------------
      - name: Commit & Push Final SVG to output/ Folder
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark#006a4e_f42a41_004d3a#e8e8ed
            dist/github-snake.svg?palette=github-light#006a4e_f42a41_004d3a#0a0a0f

      # --------------------------------
      # Step 6: output/ ফোল্ডারের
      #         ফাইলগুলো repository root-এ রাখা
      # --------------------------------
      # README.md এ আমরা `output/github-snake.svg`
      # path ব্যবহার করেছি, তাই ফাইলগুলো
      # output/ ফোল্ডারে থাকতে হবে
      # --------------------------------
      - name: Move SVG Files to output/ Directory
        run: |
          mkdir -p output
          if [ -f dist/github-snake-dark.svg ]; then
            cp dist/github-snake-dark.svg output/github-snake-dark.svg
            echo "✅ Dark SVG copied to output/"
          fi
          if [ -f dist/github-snake.svg ]; then
            cp dist/github-snake.svg output/github-snake.svg
            echo "✅ Light SVG copied to output/"
          fi
          ls -la output/

      # --------------------------------
      # Step 7: Git Commit & Push
      # --------------------------------
      # নতুন SVG ফাইলগুলো GitHub-এ push করা হবে
      # যাতে README.md সেগুলো দেখাতে পারে
      # --------------------------------
      - name: Commit Updated Snake SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          
          # আগের commit থেকে পরিবর্তন আছে কিনা চেক করা
          if git diff --cached --quiet; then
            echo "⚠️ No changes to commit — snake looks the same as yesterday"
            exit 0
          fi
          
          git commit -m "🐍 Update snake animation — $(date +%Y-%m-%d)"
          git push

      # --------------------------------
      # Step 8: সফলতার নিশ্চিতকরণ
      # --------------------------------
      - name: Verification
        run: |
          echo "============================================"
          echo "  🐍 SNAKE ANIMATION UPDATE COMPLETE"
          echo "============================================"
          echo ""
          echo "📊 Generated Files:"
          ls -lh output/ 2>/dev/null || echo "  output/ folder not found"
          echo ""
          echo "🎨 Color Palette Used:"
          echo "  ● Primary:   #006a4e (Bangladesh Green)"
          echo "  ● Secondary: #f42a41 (Bangladesh Red)"
          echo "  ● Tertiary:  #004d3a (Dark Green)"
          echo ""
          echo "📂 Your README.md references:"
          echo "  → output/github-snake-dark.svg"
          echo "  → output/github-snake.svg"
          echo ""
          echo "✅ Next auto-update: Tomorrow 00:00 UTC"
          echo "============================================"
