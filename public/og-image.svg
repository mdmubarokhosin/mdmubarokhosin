<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332"/>
      <stop offset="50%" style="stop-color:#2d3a4a"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#006a4e"/>
      <stop offset="100%" style="stop-color:#00875a"/>
    </linearGradient>
    <linearGradient id="name" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#a7f3d0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="#006a4e" opacity="0.08"/>
  <circle cx="150" cy="530" r="150" fill="#f42a41" opacity="0.06"/>
  <circle cx="600" cy="315" r="300" fill="#006a4e" opacity="0.03"/>

  <!-- Green accent line -->
  <rect x="100" y="230" width="80" height="4" rx="2" fill="url(#accent)"/>

  <!-- Name -->
  <text x="100" y="300" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="800" fill="url(#name)" letter-spacing="1">
    MD MUBAROK HOSIN
  </text>

  <!-- Title -->
  <text x="100" y="355" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.7)" letter-spacing="0.5">
    Web Developer | Bangladesh
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#006a4e" opacity="0.9"/>
  <text x="600" y="607" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="2">
    mdmubarokhosin.pages.dev
  </text>

  <!-- Corner code brackets -->
  <text x="1080" y="180" font-family="monospace" font-size="80" font-weight="300" fill="#006a4e" opacity="0.25" text-anchor="end">
    &lt;/&gt;
  </text>

  <!-- Small decorative dots -->
  <circle cx="100" cy="420" r="4" fill="#006a4e" opacity="0.5"/>
  <circle cx="120" cy="420" r="4" fill="#00875a" opacity="0.4"/>
  <circle cx="140" cy="420" r="4" fill="#10B981" opacity="0.3"/>
  <circle cx="160" cy="420" r="4" fill="#34D399" opacity="0.2"/>
</svg>
